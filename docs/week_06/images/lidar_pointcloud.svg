<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7fbf7f"/>
      <stop offset="100%" stop-color="#f2d6a7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Ground profile (DTM / terrain) -->
  <path d="M0,260 C80,230 160,220 240,240 C320,260 400,230 480,250 C560,270 640,240 720,260 C800,280 880,240 900,230" fill="url(#g)" stroke="#8aa96a" stroke-width="2"/>

  <!-- DSM surface (higher because of vegetation/buildings) -->
  <path d="M0,220 C80,190 160,180 240,200 C320,230 400,200 480,220 C560,240 640,210 720,230 C800,250 880,210 900,200" fill="none" stroke="#b55c5c" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Point cloud dots (ground returns near ground profile, vegetation returns above) -->
  <!-- ground returns -->
  <g fill="#2f7f5f" opacity="0.9">
    <circle cx="40" cy="258" r="2"/>
    <circle cx="120" cy="232" r="2"/>
    <circle cx="200" cy="222" r="2"/>
    <circle cx="280" cy="242" r="2"/>
    <circle cx="360" cy="262" r="2"/>
    <circle cx="440" cy="232" r="2"/>
    <circle cx="520" cy="252" r="2"/>
    <circle cx="600" cy="272" r="2"/>
    <circle cx="680" cy="242" r="2"/>
    <circle cx="760" cy="262" r="2"/>
    <circle cx="840" cy="232" r="2"/>
  </g>

  <!-- vegetation returns (higher) -->
  <g fill="#3b6fbf" opacity="0.8">
    <circle cx="70" cy="210" r="2.5"/>
    <circle cx="150" cy="184" r="2.5"/>
    <circle cx="230" cy="174" r="2.5"/>
    <circle cx="310" cy="196" r="2.5"/>
    <circle cx="390" cy="216" r="2.5"/>
    <circle cx="470" cy="186" r="2.5"/>
    <circle cx="550" cy="206" r="2.5"/>
    <circle cx="630" cy="226" r="2.5"/>
    <circle cx="710" cy="196" r="2.5"/>
    <circle cx="790" cy="216" r="2.5"/>
  </g>

  <!-- flight path and scan swath -->
  <path d="M0,60 L900,60" stroke="#666" stroke-width="1" stroke-dasharray="4,6"/>
  <text x="10" y="50" font-size="12" fill="#333">UAV flight line (approx.)</text>
  <rect x="40" y="70" width="820" height="40" fill="#e6f0ff" opacity="0.3" stroke="#aac"/>
  <text x="50" y="95" font-size="12" fill="#336">LiDAR scan swath (simplified)</text>

  <!-- legend -->
  <rect x="620" y="18" width="260" height="80" rx="4" fill="#fff" stroke="#ccc"/>
  <circle cx="640" cy="38" r="6" fill="#2f7f5f"/>
  <text x="660" y="42" font-size="12" fill="#333">Ground returns (last returns)</text>
  <circle cx="640" cy="64" r="6" fill="#3b6fbf"/>
  <text x="660" y="68" font-size="12" fill="#333">Higher returns (can be vegetation/buildings)</text>
  <path d="M640,90 L660,90" stroke="#b55c5c" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="670" y="94" font-size="12" fill="#333">DSM / surface (first/summary returns)</text>

  <!-- caption area -->
  <text x="10" y="340" font-size="12" fill="#333">Figure: Stylized LiDAR point cloud (dots) overlaid on an illustrative terrain profile (shaded) and a dashed DSM line; flight line and scan swath shown at top.</text>
</svg>
