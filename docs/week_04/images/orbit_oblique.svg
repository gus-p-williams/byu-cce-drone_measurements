<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#f8f9fb"/>
  <!-- building -->
  <rect x="340" y="220" width="120" height="160" fill="#d0d7de" stroke="#333" />
  <!-- orbit circles -->
  <circle cx="400" cy="300" r="140" fill="none" stroke="#ff7043" stroke-width="3" stroke-dasharray="8 6" />
  <circle cx="400" cy="300" r="100" fill="none" stroke="#ff7043" stroke-width="2" opacity="0.7" />
  <!-- camera positions on orbit -->
  <g fill="#ff7043">
    <circle cx="400" cy="160" r="6" />
    <circle cx="480" cy="190" r="6" />
    <circle cx="520" cy="260" r="6" />
    <circle cx="480" cy="350" r="6" />
    <circle cx="320" cy="350" r="6" />
    <circle cx="280" cy="260" r="6" />
    <circle cx="320" cy="190" r="6" />
  </g>
  <!-- arrows showing camera facing building (oblique) -->
  <g stroke="#ff7043" stroke-width="2" fill="none">
    <line x1="400" y1="160" x2="400" y2="210" marker-end="url(#arrow)" />
    <line x1="480" y1="190" x2="440" y2="230" marker-end="url(#arrow)" />
    <line x1="520" y1="260" x2="470" y2="280" marker-end="url(#arrow)" />
    <line x1="480" y1="350" x2="430" y2="330" marker-end="url(#arrow)" />
    <line x1="320" y1="350" x2="360" y2="320" marker-end="url(#arrow)" />
    <line x1="280" y1="260" x2="330" y2="270" marker-end="url(#arrow)" />
    <line x1="320" y1="190" x2="360" y2="210" marker-end="url(#arrow)" />
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff7043" />
    </marker>
  </defs>
  <!-- legend -->
  <g font-family="Arial" font-size="14" fill="#222">
    <rect x="20" y="470" width="320" height="110" fill="#fff" stroke="#ccc"/>
    <text x="40" y="495">Orange dashed: orbit / oblique camera path</text>
    <text x="40" y="520">Dots: sample camera positions; arrows indicate pointing direction toward structure</text>
    <text x="40" y="545">Combine with nadir passes to fill top and roof geometry</text>
  </g>
</svg>
