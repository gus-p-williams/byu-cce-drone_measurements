<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <!-- Ground / scene points -->
  <g id="scene" fill="#2b2b2b">
    <circle cx="200" cy="350" r="3" />
    <circle cx="260" cy="320" r="3" />
    <circle cx="320" cy="340" r="3" />
    <circle cx="380" cy="300" r="3" />
    <circle cx="440" cy="360" r="3" />
    <circle cx="500" cy="330" r="3" />
    <circle cx="560" cy="350" r="3" />
  </g>
  <!-- Cameras -->
  <g id="cameras" fill="#1e88e5" stroke="#0b57a4" stroke-width="2">
    <rect x="120" y="60" width="60" height="40" rx="6" ry="6"/>
    <rect x="360" y="40" width="60" height="40" rx="6" ry="6"/>
    <rect x="600" y="80" width="60" height="40" rx="6" ry="6"/>
    <text x="150" y="55" font-family="Arial" font-size="12" fill="#111">Camera A</text>
    <text x="390" y="35" font-family="Arial" font-size="12" fill="#111">Camera B</text>
    <text x="630" y="75" font-family="Arial" font-size="12" fill="#111">Camera C</text>
  </g>
  <!-- Projection rays from cameras to scene points (matching lines) -->
  <g stroke="#888" stroke-width="1">
    <line x1="150" y1="100" x2="200" y2="350" stroke-opacity="0.8" />
    <line x1="150" y1="100" x2="260" y2="320" stroke-opacity="0.8" />
    <line x1="150" y1="100" x2="320" y2="340" stroke-opacity="0.8" />

    <line x1="390" y1="80" x2="200" y2="350" stroke-opacity="0.8" />
    <line x1="390" y1="80" x2="260" y2="320" stroke-opacity="0.8" />
    <line x1="390" y1="80" x2="380" y2="300" stroke-opacity="0.8" />

    <line x1="630" y1="120" x2="440" y2="360" stroke-opacity="0.8" />
    <line x1="630" y1="120" x2="500" y2="330" stroke-opacity="0.8" />
    <line x1="630" y1="120" x2="560" y2="350" stroke-opacity="0.8" />
  </g>
  <!-- Annotate matching features -->
  <g font-family="Arial" font-size="13" fill="#333">
    <text x="120" y="150">Feature detection &amp; matching</text>
    <text x="120" y="170" font-size="11" fill="#666">Keypoints (SIFT, ORB, AKAZE) are detected in each image.</text>
    <text x="120" y="185" font-size="11" fill="#666">Matches between images (correspondences) link pixels that see the same 3D point.</text>
  </g>
  <!-- Frame around figure -->
  <rect x="10" y="10" width="880" height="480" fill="none" stroke="#ddd" stroke-width="1"/>
</svg>
