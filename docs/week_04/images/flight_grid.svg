<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="100%" height="100%" fill="#f8f9fb"/>
  <!-- field boundary -->
  <rect x="80" y="60" width="640" height="420" fill="#ffffff" stroke="#333" stroke-width="2"/>
  <!-- flight lines -->
  <g stroke="#2a6fdb" stroke-width="3" stroke-linecap="round">
    <line x1="120" y1="100" x2="680" y2="100" />
    <line x1="120" y1="160" x2="680" y2="160" />
    <line x1="120" y1="220" x2="680" y2="220" />
    <line x1="680" y1="280" x2="120" y2="280" />
    <line x1="120" y1="340" x2="680" y2="340" />
    <line x1="120" y1="400" x2="680" y2="400" />
  </g>
  <!-- image capture markers: yellow dots at regular intervals along flight lines -->
  <g id="image-markers" fill="#ffcc00" stroke="#b88600" stroke-width="1">
    <!-- positions every ~80px along the lines: 140,220,300,380,460,540,620 -->
    <!-- row y=100 (left->right) -->
    <g>
      <circle cx="140" cy="100" r="5" />
      <line x1="140" y1="92" x2="140" y2="108" stroke="#b88600" stroke-width="1" />
      <circle cx="220" cy="100" r="5" />
      <line x1="220" y1="92" x2="220" y2="108" stroke="#b88600" stroke-width="1" />
      <circle cx="300" cy="100" r="5" />
      <line x1="300" y1="92" x2="300" y2="108" stroke="#b88600" stroke-width="1" />
      <circle cx="380" cy="100" r="5" />
      <line x1="380" y1="92" x2="380" y2="108" stroke="#b88600" stroke-width="1" />
      <circle cx="460" cy="100" r="5" />
      <line x1="460" y1="92" x2="460" y2="108" stroke="#b88600" stroke-width="1" />
      <circle cx="540" cy="100" r="5" />
      <line x1="540" y1="92" x2="540" y2="108" stroke="#b88600" stroke-width="1" />
      <circle cx="620" cy="100" r="5" />
      <line x1="620" y1="92" x2="620" y2="108" stroke="#b88600" stroke-width="1" />
    </g>
    <!-- row y=160 -->
    <g>
      <circle cx="140" cy="160" r="5" />
      <line x1="140" y1="152" x2="140" y2="168" stroke="#b88600" stroke-width="1" />
      <circle cx="220" cy="160" r="5" />
      <line x1="220" y1="152" x2="220" y2="168" stroke="#b88600" stroke-width="1" />
      <circle cx="300" cy="160" r="5" />
      <line x1="300" y1="152" x2="300" y2="168" stroke="#b88600" stroke-width="1" />
      <circle cx="380" cy="160" r="5" />
      <line x1="380" y1="152" x2="380" y2="168" stroke="#b88600" stroke-width="1" />
      <circle cx="460" cy="160" r="5" />
      <line x1="460" y1="152" x2="460" y2="168" stroke="#b88600" stroke-width="1" />
      <circle cx="540" cy="160" r="5" />
      <line x1="540" y1="152" x2="540" y2="168" stroke="#b88600" stroke-width="1" />
      <circle cx="620" cy="160" r="5" />
      <line x1="620" y1="152" x2="620" y2="168" stroke="#b88600" stroke-width="1" />
    </g>
    <!-- row y=220 -->
    <g>
      <circle cx="140" cy="220" r="5" />
      <line x1="140" y1="212" x2="140" y2="228" stroke="#b88600" stroke-width="1" />
      <circle cx="220" cy="220" r="5" />
      <line x1="220" y1="212" x2="220" y2="228" stroke="#b88600" stroke-width="1" />
      <circle cx="300" cy="220" r="5" />
      <line x1="300" y1="212" x2="300" y2="228" stroke="#b88600" stroke-width="1" />
      <circle cx="380" cy="220" r="5" />
      <line x1="380" y1="212" x2="380" y2="228" stroke="#b88600" stroke-width="1" />
      <circle cx="460" cy="220" r="5" />
      <line x1="460" y1="212" x2="460" y2="228" stroke="#b88600" stroke-width="1" />
      <circle cx="540" cy="220" r="5" />
      <line x1="540" y1="212" x2="540" y2="228" stroke="#b88600" stroke-width="1" />
      <circle cx="620" cy="220" r="5" />
      <line x1="620" y1="212" x2="620" y2="228" stroke="#b88600" stroke-width="1" />
    </g>
    <!-- row y=280 (right->left direction but markers are symmetric) -->
    <g>
      <circle cx="140" cy="280" r="5" />
      <line x1="140" y1="272" x2="140" y2="288" stroke="#b88600" stroke-width="1" />
      <circle cx="220" cy="280" r="5" />
      <line x1="220" y1="272" x2="220" y2="288" stroke="#b88600" stroke-width="1" />
      <circle cx="300" cy="280" r="5" />
      <line x1="300" y1="272" x2="300" y2="288" stroke="#b88600" stroke-width="1" />
      <circle cx="380" cy="280" r="5" />
      <line x1="380" y1="272" x2="380" y2="288" stroke="#b88600" stroke-width="1" />
      <circle cx="460" cy="280" r="5" />
      <line x1="460" y1="272" x2="460" y2="288" stroke="#b88600" stroke-width="1" />
      <circle cx="540" cy="280" r="5" />
      <line x1="540" y1="272" x2="540" y2="288" stroke="#b88600" stroke-width="1" />
      <circle cx="620" cy="280" r="5" />
      <line x1="620" y1="272" x2="620" y2="288" stroke="#b88600" stroke-width="1" />
    </g>
    <!-- row y=340 -->
    <g>
      <circle cx="140" cy="340" r="5" />
      <line x1="140" y1="332" x2="140" y2="348" stroke="#b88600" stroke-width="1" />
      <circle cx="220" cy="340" r="5" />
      <line x1="220" y1="332" x2="220" y2="348" stroke="#b88600" stroke-width="1" />
      <circle cx="300" cy="340" r="5" />
      <line x1="300" y1="332" x2="300" y2="348" stroke="#b88600" stroke-width="1" />
      <circle cx="380" cy="340" r="5" />
      <line x1="380" y1="332" x2="380" y2="348" stroke="#b88600" stroke-width="1" />
      <circle cx="460" cy="340" r="5" />
      <line x1="460" y1="332" x2="460" y2="348" stroke="#b88600" stroke-width="1" />
      <circle cx="540" cy="340" r="5" />
      <line x1="540" y1="332" x2="540" y2="348" stroke="#b88600" stroke-width="1" />
      <circle cx="620" cy="340" r="5" />
      <line x1="620" y1="332" x2="620" y2="348" stroke="#b88600" stroke-width="1" />
    </g>
    <!-- row y=400 -->
    <g>
      <circle cx="140" cy="400" r="5" />
      <line x1="140" y1="392" x2="140" y2="408" stroke="#b88600" stroke-width="1" />
      <circle cx="220" cy="400" r="5" />
      <line x1="220" y1="392" x2="220" y2="408" stroke="#b88600" stroke-width="1" />
      <circle cx="300" cy="400" r="5" />
      <line x1="300" y1="392" x2="300" y2="408" stroke="#b88600" stroke-width="1" />
      <circle cx="380" cy="400" r="5" />
      <line x1="380" y1="392" x2="380" y2="408" stroke="#b88600" stroke-width="1" />
      <circle cx="460" cy="400" r="5" />
      <line x1="460" y1="392" x2="460" y2="408" stroke="#b88600" stroke-width="1" />
      <circle cx="540" cy="400" r="5" />
      <line x1="540" y1="392" x2="540" y2="408" stroke="#b88600" stroke-width="1" />
      <circle cx="620" cy="400" r="5" />
      <line x1="620" y1="392" x2="620" y2="408" stroke="#b88600" stroke-width="1" />
    </g>
  </g>
  <!-- arrows to indicate direction alternating -->
  <g fill="#2a6fdb">
    <polygon points="660,92 675,100 660,108" />
    <polygon points="140,152 125,160 140,168" />
    <polygon points="660,212 675,220 660,228" />
    <polygon points="140,272 125,280 140,288" />
    <polygon points="660,332 675,340 660,348" />
    <polygon points="140,392 125,400 140,408" />
  </g>
  <!-- cross-hatch secondary pass lightly -->
  <g stroke="#66bb6a" stroke-width="2" stroke-dasharray="6 6" opacity="0.8">
    <line x1="200" y1="80" x2="560" y2="500" />
    <line x1="260" y1="80" x2="620" y2="500" />
  </g>
  <!-- legend -->
  <g font-family="Arial" font-size="14" fill="#222">
    <rect x="20" y="470" width="320" height="110" fill="#fff" stroke="#ccc"/>
    <text x="40" y="495">Blue solid: planned flight lines (nadir)</text>
    <text x="40" y="520">Green dashed: optional cross-hatch / perpendicular passes</text>
    <text x="40" y="545">Arrows show sensor direction; alternating for battery/turn planning</text>
    <text x="40" y="565">Yellow dots: image capture positions along flight line</text>
  </g>
</svg>
