<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <!-- Stage 1: sparse point cloud -->
  <g id="sparse" transform="translate(40,40)">
    <text x="0" y="0" font-family="Arial" font-size="16" fill="#111">1) Sparse (coarse) point cloud</text>
    <g transform="translate(0,20)" fill="#333">
      <!-- sparse random dots -->
      <circle cx="60" cy="120" r="2" />
      <circle cx="100" cy="80" r="2" />
      <circle cx="140" cy="140" r="2" />
      <circle cx="200" cy="90" r="2" />
      <circle cx="260" cy="130" r="2" />
      <circle cx="320" cy="110" r="2" />
      <circle cx="380" cy="145" r="2" />
      <circle cx="440" cy="95" r="2" />
      <circle cx="500" cy="125" r="2" />
    </g>
  </g>
  <!-- arrow to next stage -->
  <g>
    <line x1="560" y1="120" x2="620" y2="120" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <!-- Stage 2: dense point cloud -->
  <g id="dense" transform="translate(660,40)">
    <text x="0" y="0" font-family="Arial" font-size="16" fill="#111">2) Dense point cloud</text>
    <g transform="translate(0,20)" fill="#444">
      <!-- denser dots -->
      <g>
        <circle cx="60" cy="40" r="1.5" />
        <circle cx="80" cy="50" r="1.5" />
        <circle cx="100" cy="42" r="1.5" />
        <circle cx="120" cy="60" r="1.5" />
        <circle cx="140" cy="48" r="1.5" />
        <circle cx="160" cy="70" r="1.5" />
        <circle cx="180" cy="52" r="1.5" />
        <circle cx="200" cy="68" r="1.5" />
      </g>
      <g transform="translate(0,60)">
        <circle cx="60" cy="40" r="1.5" />
        <circle cx="80" cy="50" r="1.5" />
        <circle cx="100" cy="42" r="1.5" />
        <circle cx="120" cy="60" r="1.5" />
        <circle cx="140" cy="48" r="1.5" />
        <circle cx="160" cy="70" r="1.5" />
        <circle cx="180" cy="52" r="1.5" />
        <circle cx="200" cy="68" r="1.5" />
      </g>
    </g>
  </g>
  <!-- arrow to next stage -->
  <g>
    <line x1="560" y1="320" x2="620" y2="320" stroke="#999" stroke-width="2" marker-end="url(#arrow)" />
  </g>
  <!-- Stage 3: mesh / polygon -->
  <g id="mesh" transform="translate(320,350)">
    <text x="0" y="0" font-family="Arial" font-size="16" fill="#111">3) Mesh / textured polygons</text>
    <g transform="translate(20,20)" fill="#f2c14e" stroke="#c97a00" stroke-width="1">
      <!-- a simple triangular mesh shape -->
      <polygon points="40,40 120,20 200,60 160,120 80,100" />
      <polygon points="120,20 220,30 200,60" />
      <polygon points="80,100 160,120 120,20" />
    </g>
    <text x="0" y="140" font-family="Arial" font-size="12" fill="#444">Textured mesh &amp; orthophotos are generated from the dense cloud and images.</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666" />
    </marker>
  </defs>

  <!-- frame -->
  <rect x="5" y="5" width="890" height="690" fill="none" stroke="#eee" stroke-width="1"/>
</svg>
